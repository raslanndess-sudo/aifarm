<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Model Manager — OpenClaw</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#1e1e2e;
  --text:#e8e8f0;--dim:#6b6b8a;--accent:#5b6ef5;--green:#3dd68c;
  --red:#f55b5b;--amber:#f5a623;--radius:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',Inter,system-ui,sans-serif}
a{color:var(--accent);text-decoration:none}

/* layout */
.shell{max-width:900px;margin:0 auto;padding:24px 20px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.header .dot{width:10px;height:10px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(61,214,140,.4)}50%{box-shadow:0 0 0 6px rgba(61,214,140,0)}}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
.header .sub{font-size:12px;color:var(--dim);margin-left:auto;font-family:'Consolas',monospace}

/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:14px;font-weight:600}
.card h2 .badge{font-size:11px;padding:2px 8px;border-radius:4px;margin-left:8px;font-weight:500;vertical-align:middle}
.badge-green{color:var(--green);background:rgba(61,214,140,.1)}
.badge-red{color:var(--red);background:rgba(245,91,91,.1)}
.badge-amber{color:var(--amber);background:rgba(245,166,35,.1)}
.badge-accent{color:var(--accent);background:rgba(91,110,245,.1)}

/* current model */
.current-model{font-size:22px;font-weight:700;color:var(--text);font-family:'Consolas',monospace;letter-spacing:-.01em}
.current-model .provider{color:var(--accent)}

/* input row */
.input-row{display:flex;gap:10px;align-items:center}
.input-row input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;outline:none;transition:border .2s}
.input-row input:focus{border-color:var(--accent)}
.input-row input::placeholder{color:var(--dim)}

/* buttons */
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#4a5de4}
.btn-danger{background:rgba(245,91,91,.15);color:var(--red);border:1px solid rgba(245,91,91,.25)}
.btn-danger:hover{background:rgba(245,91,91,.25)}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--dim)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* model list */
.model-grid{display:flex;flex-direction:column;gap:6px}
.model-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.model-row:hover{border-color:var(--dim)}
.model-row.active{border-color:var(--green);background:rgba(61,214,140,.05)}
.model-row .name{font-family:'Consolas',monospace;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-row .tag{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:500;font-family:'Consolas',monospace}
.model-row .actions{display:flex;gap:6px}

/* alem models checklist */
.check-list{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto;margin-bottom:14px}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border-radius:6px;cursor:pointer;transition:background .1s}
.check-item:hover{background:rgba(91,110,245,.06)}
.check-item input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
.check-item label{font-family:'Consolas',monospace;font-size:13px;cursor:pointer;flex:1}
.check-item .owner{font-size:11px;color:var(--dim)}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

/* spinner */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* section gap */
.section-gap{margin-top:8px}
</style>
</head>
<body>
<div class="shell">

<!-- header -->
<div class="header">
  <div class="dot"></div>
  <h1>Model Manager</h1>
  <span class="sub" id="clock"></span>
</div>

<!-- current model -->
<div class="card">
  <h2>Активная модель</h2>
  <div class="current-model" id="currentModel">—</div>
</div>

<!-- all models -->
<div class="card">
  <h2>Доступные модели <span class="badge badge-accent" id="modelCount">0</span></h2>
  <div class="model-grid" id="modelGrid"></div>
</div>

<!-- alem.cloud -->
<div class="card">
  <h2>Alem.Cloud
    <span class="badge" id="alemBadge">—</span>
  </h2>

  <!-- api key -->
  <div class="input-row" style="margin-bottom:14px">
    <input type="password" id="apiKeyInput" placeholder="Вставьте API ключ Alem.Cloud"/>
    <button class="btn btn-primary btn-sm" id="saveKeyBtn" onclick="saveKey()">Сохранить</button>
  </div>
  <div id="keyStatus" style="font-size:12px;color:var(--dim);margin-bottom:16px"></div>

  <!-- fetch models -->
  <div style="display:flex;gap:10px;margin-bottom:14px">
    <button class="btn btn-ghost btn-sm" id="fetchModelsBtn" onclick="fetchAlemModels()">📡 Загрузить список моделей</button>
    <button class="btn btn-danger btn-sm" id="disconnectBtn" onclick="disconnectAlem()" style="display:none">Отключить Alem.Cloud</button>
  </div>

  <!-- model checklist -->
  <div class="check-list" id="alemList" style="display:none"></div>
  <button class="btn btn-primary btn-sm" id="connectBtn" onclick="connectSelected()" style="display:none">✅ Подключить выбранные</button>
</div>

<!-- fallbacks -->
<div class="card">
  <h2>Fallback-цепочка</h2>
  <div class="model-grid" id="fallbackGrid"></div>
</div>

</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<script>
const API = '';
let state = {};

// ── toast ───
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// ── clock ───
function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleString('ru-RU', {hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Qyzylorda'}) + ' GMT+5';
}
setInterval(tick, 1000); tick();

// ── load status ─
async function loadStatus() {
  try {
    const r = await fetch('/api/status');
    state = await r.json();
    render();
  } catch(e) { toast('Не удалось загрузить статус', 'err'); }
}

function render() {
  // current model
  const cm = document.getElementById('currentModel');
  const parts = state.primary.split('/');
  if (parts.length === 2) {
    cm.innerHTML = `<span class="provider">${parts[0]}/</span>${parts[1]}`;
  } else {
    cm.textContent = state.primary || '—';
  }

  // model count
  document.getElementById('modelCount').textContent = state.models.length;

  // model grid
  const grid = document.getElementById('modelGrid');
  grid.innerHTML = '';
  for (const m of state.models) {
    const isActive = m === state.primary;
    const provider = m.split('/')[0] || '';
    let tagClass = 'badge-accent';
    if (provider === 'openai') tagClass = 'badge-green';
    else if (provider === 'anthropic') tagClass = 'badge-amber';
    else if (provider === 'alem') tagClass = 'badge-accent';

    const row = document.createElement('div');
    row.className = 'model-row' + (isActive ? ' active' : '');
    row.innerHTML = `
      <span class="name">${m}</span>
      <span class="tag ${tagClass}">${provider}</span>
      <div class="actions">
        ${isActive
          ? '<span style="color:var(--green);font-size:12px;font-weight:600">● ACTIVE</span>'
          : `<button class="btn btn-ghost btn-sm" onclick="switchModel('${m}')">Выбрать</button>`}
      </div>`;
    grid.appendChild(row);
  }

  // fallbacks
  const fg = document.getElementById('fallbackGrid');
  fg.innerHTML = '';
  state.fallbacks.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'model-row';
    row.innerHTML = `
      <span style="color:var(--dim);font-size:11px;width:24px;text-align:center">#${i+1}</span>
      <span class="name">${f}</span>
      <button class="btn btn-danger btn-sm" onclick="removeFallback('${f}')">✕</button>`;
    fg.appendChild(row);
  });

  // alem badge
  const badge = document.getElementById('alemBadge');
  if (state.has_alem) {
    badge.textContent = 'Подключён';
    badge.className = 'badge badge-green';
    document.getElementById('disconnectBtn').style.display = '';
  } else {
    badge.textContent = 'Не подключён';
    badge.className = 'badge badge-red';
    document.getElementById('disconnectBtn').style.display = 'none';
  }

  // key status
  const ks = document.getElementById('keyStatus');
  if (state.api_key_set) {
    ks.innerHTML = `🔑 Ключ сохранён: <code>${state.api_key_preview}</code>`;
  } else {
    ks.textContent = 'Ключ не задан';
  }
}

// ── save key ─
async function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return toast('Введите ключ', 'err');
  const btn = document.getElementById('saveKeyBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
  try {
    const r = await fetch('/api/save-key', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key})});
    const d = await r.json();
    if (d.ok) { toast('Ключ сохранён'); document.getElementById('apiKeyInput').value = ''; loadStatus(); }
    else toast(d.error, 'err');
  } catch(e) { toast('Ошибка', 'err'); }
  btn.disabled = false; btn.textContent = 'Сохранить';
}

// ── fetch alem models ─
async function fetchAlemModels() {
  const btn = document.getElementById('fetchModelsBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Загрузка...';
  try {
    const r = await fetch('/api/alem-models');
    const d = await r.json();
    if (d.error) { toast(d.error, 'err'); return; }
    const list = document.getElementById('alemList');
    list.style.display = '';
    list.innerHTML = '';
    for (const m of d.models) {
      const item = document.createElement('div');
      item.className = 'check-item';
      item.innerHTML = `
        <input type="checkbox" id="alem_${m.id}" value="${m.id}" checked/>
        <label for="alem_${m.id}">${m.id}</label>
        <span class="owner">${m.owned_by}</span>`;
      list.appendChild(item);
    }
    document.getElementById('connectBtn').style.display = '';
    toast(`Найдено ${d.models.length} моделей`);
  } catch(e) { toast('Ошибка загрузки', 'err'); }
  btn.disabled = false; btn.textContent = '📡 Загрузить список моделей';
}

// ── connect selected ─
async function connectSelected() {
  const checks = document.querySelectorAll('#alemList input:checked');
  const ids = [...checks].map(c => c.value);
  if (!ids.length) return toast('Выберите модели', 'err');
  const btn = document.getElementById('connectBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
  try {
    const r = await fetch('/api/connect-alem', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({models: ids})});
    const d = await r.json();
    if (d.ok) { toast(`Подключено ${d.added} моделей`); loadStatus(); }
    else toast(d.error, 'err');
  } catch(e) { toast('Ошибка', 'err'); }
  btn.disabled = false; btn.textContent = '✅ Подключить выбранные';
}

// ── disconnect ─
async function disconnectAlem() {
  if (!confirm('Отключить Alem.Cloud и удалить все его модели?')) return;
  try {
    const r = await fetch('/api/disconnect-alem', {method:'POST'});
    const d = await r.json();
    if (d.ok) { toast('Alem.Cloud отключён'); document.getElementById('alemList').style.display = 'none'; document.getElementById('connectBtn').style.display = 'none'; loadStatus(); }
  } catch(e) { toast('Ошибка', 'err'); }
}

// ── switch model ─
async function switchModel(id) {
  try {
    const r = await fetch('/api/switch-model', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model: id})});
    const d = await r.json();
    if (d.ok) { toast(`Модель: ${id}`); loadStatus(); }
    else toast(d.error, 'err');
  } catch(e) { toast('Ошибка переключения', 'err'); }
}

// ── fallback management ─
async function removeFallback(id) {
  try {
    await fetch('/api/remove-fallback', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model: id})});
    toast('Удалено из fallback'); loadStatus();
  } catch(e) { toast('Ошибка', 'err'); }
}

// ── init ─
loadStatus();
</script>
</body>
</html>
